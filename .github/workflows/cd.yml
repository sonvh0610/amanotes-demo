name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalize GHCR owner
        id: owner
        shell: bash
        run: |
          echo "owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/goodjob-api:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/goodjob-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          build-args: |
            VITE_API_BASE_URL=
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/goodjob-web:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/goodjob-web:latest

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push-images
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_OWNER: ${{ needs.build-and-push-images.outputs.owner_lc }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          envs: GHCR_OWNER,IMAGE_TAG,GHCR_USERNAME,GHCR_READ_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.PROD_DEPLOY_PATH }}"

            if [ -d .git ]; then
              git fetch --all --prune
              git checkout main
              git pull --ff-only origin main
            fi

            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            docker compose -f deploy/docker-compose.prod.yml pull
            docker compose -f deploy/docker-compose.prod.yml run --rm api node apps/api/dist/apps/api/src/app/db/migrate.js
            docker compose -f deploy/docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f
