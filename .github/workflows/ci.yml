name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: 'false'
      NODE_ENV: test
      DATABASE_URL: postgres://app:app@localhost:54322/goodjob
      DATABASE_URL_TEST: postgres://app:app@localhost:54322/goodjob
      REDIS_URL: redis://localhost:6379
      REDIS_URL_TEST: redis://localhost:6379
      APP_BASE_URL: http://localhost:4200
      API_BASE_URL: http://localhost:3000
      SESSION_COOKIE_NAME: goodjob_session
      SESSION_TTL_HOURS: 168
      JWT_SECRET: change-me-with-at-least-32-characters
      CSRF_COOKIE_NAME: goodjob_csrf
      CSRF_HEADER_NAME: x-csrf-token
      OIDC_ISSUER_URL: https://sso.example.com
      OIDC_CLIENT_ID: test-client-id
      OIDC_CLIENT_SECRET: test-client-secret
      OIDC_REDIRECT_URI: http://localhost:3000/auth/oidc/callback
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: ap-southeast-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: goodjob-media
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW: 1 minute
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: goodjob
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U app -d goodjob"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set Nx SHAs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            NX_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            NX_BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$NX_BASE_SHA" ] || [ "$NX_BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            NX_BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi

          echo "NX_BASE=$NX_BASE_SHA" >> "$GITHUB_ENV"
          echo "NX_HEAD=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Format check
        run: npm exec nx format:check -- --base="$NX_BASE" --head="$NX_HEAD"

      - name: Affected quality gates
        run: npm exec nx affected -- --targets=typecheck,test,build --base="$NX_BASE" --head="$NX_HEAD" --parallel=3
